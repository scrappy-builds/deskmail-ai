appId: com.deskmail.ai
productName: DeskMail AI
# Personal-use build: no code-signing, no notarisation, no licence UI.

# asar disabled on purpose: node-sqlite3-wasm needs its .wasm on disk and the
# standalone MCP server (launched by Claude Desktop) must require its deps as
# plain files. Unpacked is simplest and reliable for a single-user app.
asar: false

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*
  - package.json
  - '!**/*.{map,md,ts}'
  - '!**/{test,tests,__tests__,example,examples,.github}/**'

extraMetadata:
  main: out/main/index.js

# deskmail:// carries toast quick-action activations back to the running app.
# mailto registers DeskMail as an *available* email-link handler; the user still
# confirms it as the default in Windows' own Default-apps page (Win10+ rule).
protocols:
  - name: DeskMail AI
    schemes:
      - deskmail
  - name: Email
    schemes:
      - mailto

win:
  icon: build/icon.png
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  # Deliberately NOT allowToChangeInstallationDirectory: with it on, electron-builder
  # forces isTryToKeepShortcuts=false on any manual (non --updated) reinstall, so the
  # installer both recreates the Start/desktop shortcut and lets the old uninstaller
  # delete it — and Windows drops the *pin* whenever the shortcut file is removed.
  # A fixed install path keeps the existing shortcut (and its pin) in place across
  # reinstalls. Single-user personal app: nobody needs a custom install dir.
  artifactName: ${productName}-${version}-setup.${ext}
  # Adds the ticked-by-default "Set DeskMail as my default email app" checkbox
  # to the installer's finish page (see build/installer.nsh).
  include: build/installer.nsh
